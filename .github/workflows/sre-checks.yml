name: sre-checks

on:
  pull_request:
    branches: [main]

jobs:
  sre-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Python syntax check
        run: python -m py_compile snake_game.py

      - name: Health Endpoint Check
        run: echo "No health endpoint for this repo - skipping"

      - name: Timeout & Retry Policy Check
        run: echo "No retry logic configured - skipping"

      - name: Unit Tests
        run: echo "No unit tests yet - skipping"
